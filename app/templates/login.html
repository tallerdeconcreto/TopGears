{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow">
            <div class="card-header text-center">
                <h2 class="mb-0 title-accent">Entrar na Garagem</h2>
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold label-soft">Nome de Usuario</label>
                        <input type="text" name="username" class="form-control" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold label-soft">Senha</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">Fazer Login</button>
                    </div>
                </form>
            </div>
            <div class="card-footer text-center py-3">
                Nao tem uma conta? <a href="{{ url_for('main.register') }}" class="text-decoration-none fw-bold">Cadastre-se aqui</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
